<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>StampStack</title>
  </head>
  <body>
    <header class="head">
      <div class="brand">
        <span class="dot" id="statusDot"></span>
        <span class="name">StampStack</span>
      </div>
      <button class="icon-btn" id="optionsBtn" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <section class="site">
      <div class="site-host" id="host">—</div>
      <div class="site-sub" id="siteSub">Blocking on this site</div>
    </section>

    <label class="switch-row">
      <span id="siteToggleLabel">Block on this site</span>
      <span class="switch">
        <input type="checkbox" id="siteToggle" aria-label="Block on this site" />
        <span class="slider"></span>
      </span>
    </label>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="tabBlocked">0</div>
        <div class="stat-label">blocked here</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalBlocked">0</div>
        <div class="stat-label">blocked total</div>
      </div>
    </div>

    <label class="switch-row subtle">
      <span>Pause StampStack everywhere</span>
      <span class="switch">
        <input type="checkbox" id="pauseToggle" aria-label="Pause StampStack everywhere" />
        <span class="slider"></span>
      </span>
    </label>

    <section class="feature-block">
      <div class="feature-title">YouTube</div>
      <label class="switch-row subtle">
        <span>Hide promoted videos</span>
        <span class="switch">
          <input type="checkbox" id="ytSponsoredToggle" aria-label="Hide promoted videos" />
          <span class="slider"></span>
        </span>
      </label>
      <label class="switch-row subtle">
        <span>Block Shorts</span>
        <span class="switch">
          <input type="checkbox" id="ytShortsToggle" aria-label="Block Shorts" />
          <span class="slider"></span>
        </span>
      </label>
      <label class="switch-row subtle">
        <span>SponsorBlock skip</span>
        <span class="switch">
          <input type="checkbox" id="ytSponsorBlockToggle" aria-label="SponsorBlock skip" />
          <span class="slider"></span>
        </span>
      </label>
    </section>

    <section class="feature-block" id="darkModeBlock">
      <div class="feature-title">Dark mode</div>

      <!-- Primary: one-click dark mode for the current page -->
      <label class="switch-row dark-site-row" id="darkSiteRow" hidden>
        <span class="dark-site-text">
          <span id="darkSiteLabel">Dark mode on this page</span>
          <span class="dark-site-host" id="darkSiteHost"></span>
        </span>
        <span class="switch">
          <input type="checkbox" id="darkSiteToggle" aria-label="Dark mode on this page" />
          <span class="slider"></span>
        </span>
      </label>
      <button type="button" class="dark-reset-link" id="darkResetBtn" hidden>
        ↺ Reset to global default
      </button>

      <!-- Secondary: default for every site -->
      <label class="switch-row subtle" id="darkModeRow" hidden>
        <span id="darkModeLabel">Enable on all sites</span>
        <span class="switch">
          <input type="checkbox" id="darkModeToggle" aria-label="Dark mode on all sites" />
          <span class="slider"></span>
        </span>
      </label>

      <div class="dark-upsell" id="darkUpsell" hidden>
        <p class="dark-upsell-text">
          Darken any page with a smart, matte dark theme. One-time
          <span id="darkPrice">$2</span> unlock — separate from ad blocking.
        </p>
        <button type="button" class="btn-buy" id="darkBuyBtn">Buy dark mode</button>
        <button type="button" class="btn-buy btn-dev" id="darkDevUnlockBtn" hidden>
          Dev unlock (unpacked)
        </button>
      </div>

      <p class="dark-hint" id="darkAutoNote" hidden>
        This site already looks dark, so dark mode stays off here — inverting it would make
        it light.
      </p>
      <p class="dark-hint" id="darkHint" hidden></p>
    </section>

    <footer class="foot">
      <button class="link" id="openOptions">Filter lists &amp; settings →</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
