<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>StampStack</title>
  </head>
  <body>
    <header class="head">
      <div class="brand">
        <span class="dot" id="statusDot"></span>
        <span class="name">StampStack</span>
      </div>
      <button class="icon-btn" id="optionsBtn" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <section class="site">
      <div class="site-host" id="host">—</div>
      <div class="site-sub" id="siteSub">Blocking on this site</div>
    </section>

    <label class="switch-row">
      <span id="siteToggleLabel">Block on this site</span>
      <span class="switch">
        <input type="checkbox" id="siteToggle" aria-label="Block on this site" />
        <span class="slider"></span>
      </span>
    </label>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="tabBlocked">0</div>
        <div class="stat-label">blocked here</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalBlocked">0</div>
        <div class="stat-label">blocked total</div>
      </div>
    </div>

    <label class="switch-row subtle">
      <span>Pause StampStack everywhere</span>
      <span class="switch">
        <input type="checkbox" id="pauseToggle" aria-label="Pause StampStack everywhere" />
        <span class="slider"></span>
      </span>
    </label>

    <section class="feature-block">
      <div class="feature-title">YouTube</div>
      <label class="switch-row subtle">
        <span>Block sponsored videos</span>
        <span class="switch">
          <input type="checkbox" id="ytSponsoredToggle" aria-label="Block sponsored videos" />
          <span class="slider"></span>
        </span>
      </label>
      <label class="switch-row subtle">
        <span>Block Shorts</span>
        <span class="switch">
          <input type="checkbox" id="ytShortsToggle" aria-label="Block Shorts" />
          <span class="slider"></span>
        </span>
      </label>
    </section>

    <section class="feature-block" id="darkModeBlock">
      <div class="feature-title">Dark mode</div>
      <label class="switch-row subtle" id="darkModeRow">
        <span id="darkModeLabel">Dark mode</span>
        <span class="switch">
          <input type="checkbox" id="darkModeToggle" aria-label="Dark mode" />
          <span class="slider"></span>
        </span>
      </label>
      <div class="dark-upsell" id="darkUpsell" hidden>
        <p class="dark-upsell-text">
          Darken any page with a smart invert theme. One-time
          <span id="darkPrice">$2</span> unlock — separate from ad blocking.
        </p>
        <button type="button" class="btn-buy" id="darkBuyBtn">Buy dark mode</button>
        <button type="button" class="btn-buy btn-dev" id="darkDevUnlockBtn" hidden>
          Dev unlock (unpacked)
        </button>
        <p class="dark-hint" id="darkHint" hidden></p>
      </div>
      <label class="dark-override" id="darkOverrideWrap" hidden>
        <span>This site</span>
        <select id="darkOverride" aria-label="Dark mode for this site">
          <option value="">Follow global</option>
          <option value="on">Force on</option>
          <option value="off">Force off</option>
        </select>
      </label>
      <p class="dark-hint" id="darkAutoNote" hidden>Auto-disabled (site looks dark)</p>
    </section>

    <footer class="foot">
      <button class="link" id="openOptions">Filter lists &amp; settings →</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
